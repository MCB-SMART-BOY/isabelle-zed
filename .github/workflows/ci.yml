name: CI

on:
  push:
    branches: [main, master, chore/rust-workspace-dedup]
  pull_request:
    branches: [main, master, chore/rust-workspace-dedup]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Workspace Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Check extension wasm target
        run: cargo check -p isabelle-zed-extension --target wasm32-wasip2

  mock-e2e:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: [quality]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Mock E2E (Bridge --adapter-command)
            os: ubuntu-latest
            command: spawn-e2e-ndjson
          - name: Mock E2E (LSP -> Bridge)
            os: ubuntu-latest
            command: mock-lsp-e2e
          - name: Mock E2E (LSP -> Bridge TCP, Linux)
            os: ubuntu-latest
            command: mock-lsp-e2e-tcp
          - name: Mock E2E (LSP -> Bridge TCP, Windows)
            os: windows-latest
            command: mock-lsp-e2e-tcp
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run E2E
        run: cargo run -p isabelle-zed-xtask -- ${{ matrix.command }}

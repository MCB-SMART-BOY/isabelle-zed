name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  bridge:
    name: Bridge (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Format check
        run: cargo fmt -p isabelle-bridge -- --check

      - name: Clippy
        run: cargo clippy -p isabelle-bridge -- -D warnings

      - name: Test
        run: cargo test -p isabelle-bridge

  isabelle-lsp:
    name: Isabelle LSP (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Format check
        run: cargo fmt -p isabelle-zed-lsp -- --check

      - name: Clippy
        run: cargo clippy -p isabelle-zed-lsp -- -D warnings

      - name: Test
        run: cargo test -p isabelle-zed-lsp

  zed-extension:
    name: Zed Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Check (host)
        run: cargo check -p isabelle-zed-extension

      - name: Check (wasm32-wasip2)
        run: cargo check -p isabelle-zed-extension --target wasm32-wasip2

  xtask:
    name: Xtask
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check
        run: cargo check -p isabelle-zed-xtask

  mock-e2e-ndjson:
    name: Mock E2E (Bridge --adapter-command)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [bridge, xtask]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run NDJSON E2E
        run: cargo run -p isabelle-zed-xtask -- spawn-e2e-ndjson

  mock-e2e-lsp:
    name: Mock E2E (LSP -> Bridge)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [bridge, isabelle-lsp, xtask]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run LSP E2E
        run: cargo run -p isabelle-zed-xtask -- mock-lsp-e2e

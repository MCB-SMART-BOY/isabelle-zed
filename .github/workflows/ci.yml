name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Workspace Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Check extension wasm target
        run: cargo check -p isabelle-zed-extension --target wasm32-wasip2

  mock-e2e-ndjson:
    name: Mock E2E (Bridge --adapter-command)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run NDJSON E2E
        run: cargo run -p isabelle-zed-xtask -- spawn-e2e-ndjson

  mock-e2e-lsp:
    name: Mock E2E (LSP -> Bridge)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run LSP E2E
        run: cargo run -p isabelle-zed-xtask -- mock-lsp-e2e

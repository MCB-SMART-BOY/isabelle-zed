name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: Verify Before Packaging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Run NDJSON E2E
        run: cargo run -p isabelle-zed-xtask -- spawn-e2e-ndjson

      - name: Run LSP TCP E2E
        run: cargo run -p isabelle-zed-xtask -- mock-lsp-e2e-tcp

      - name: Check extension wasm target
        run: cargo check -p isabelle-zed-extension --target wasm32-wasip2

  package:
    name: Build Release Package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [verify]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Build package
        run: cargo run -p isabelle-zed-xtask -- release-package --platform linux-x86_64

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: isabelle-zed-release
          path: |
            dist/*.tar.gz
            dist/*.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
